<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' data:;
             script-src 'self' 'unsafe-inline';
             style-src 'self' 'unsafe-inline';
             connect-src https://api.open-meteo.com https://site.api.espn.com;" />
  <title>Polaris</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="location">
        <span class="location-icon">📍</span>
        <span class="location-name">Twin Cities, MN</span>
      </div>
      <div id="current-summary" class="current-summary">
        <div class="current-temp" id="current-temp">--</div>
        <div class="current-condition" id="current-condition">Loading...</div>
        <div class="current-feels" id="current-feels"></div>
      </div>
      <div id="last-updated" class="last-updated"></div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="daily">Weather</button>
      <button class="tab-btn" data-tab="sports">Sports</button>
      <button class="tab-btn" data-tab="planets">Planets</button>
    </nav>

    <main>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Fetching weather...</p>
      </div>

      <div id="error-msg" class="error-msg hidden">
        <p>Failed to load weather data.</p>
        <button id="retry-btn">Retry</button>
      </div>

      <section id="daily" class="tab-content active">
        <div id="daily-list" class="daily-list"></div>
      </section>

      <section id="sports" class="tab-content">
        <div id="sports-list" class="sports-list"></div>
      </section>

      <section id="planets" class="tab-content">
        <div id="planets-list" class="planets-list"></div>
      </section>
    </main>
  </div>

  <script src="js/astronomy.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
